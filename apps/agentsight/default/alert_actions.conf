# Custom alert action — Python handler in agentsight_investigate.py
[default]
forceCsvResults = true

[agentsight_investigate]
is_custom = 1
disabled = 0
track_alert = 1

label = AgentSight Investigate
description = AI investigation agent for MCP and autonomous agent alerts

payload_format = json
alert.execute.cmd = agentsight_investigate.py
python.version = python3
python.required = latest

ttl = 120
maxtime = 5m
