# AI classification settings for classify_agent_behavior (| ai command).
# Override with environment: AGENTSIGHT_AI_PROVIDER, AGENTSIGHT_AI_MODEL, AGENTSIGHT_AI_CONNECTION
#
# Path A (submission default): Foundation-Sec open weights in Ollama — see scripts/sh/setup_foundation_sec_ollama.sh
# Path B (optional clip): Splunk Hosted Models on Splunk Cloud — uncomment block below

[ai]
provider = Ollama
model = hf.co/gabriellarson/Foundation-Sec-8B-Instruct-GGUF:Q8_0
connection = ollama_local

