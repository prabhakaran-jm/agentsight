# Normalizes live MCP Server audit events into index=agentsight / sourcetype=agentsight:mcp_audit.
# Enable scheduling after install, or run manually following MCP activity.

[AgentSight - Normalize MCP Audit]
description = Copy MCP Server tool/call events from _internal/mcp_server into agentsight:mcp_audit with normalized field names.
search = index=_internal sourcetype=mcp_server rpc_method=tools/call \
| spath \
| eval mcp_user=username, mcp_tool=tool_name, session_id=request_id, duration_ms=round(execution_time_seconds*1000,0), outcome=status, client_ip=source_ip \
| rex field=message "Executing SPL query: (?<spl_query>.+?) \(" \
| table _time mcp_user mcp_tool session_id duration_ms outcome spl_query client_ip source_ip request_id tool_name username status execution_time_seconds auth_method rpc_method message \
| collect index=agentsight sourcetype=agentsight:mcp_audit

dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 0
is_scheduled = 0

# --- Detection rules (agent/MCP-native) ---
# Stateless MCP uses per-call request_id — Rule 1 groups by username + 10m window.
# Enable schedules after install. Alert action is a stub until Task 5.

[AgentSight - MCP Tool Loop]
description = MCP agent runaway tool loop — high-volume splunk_run_query calls in a 10-minute window with few distinct tools.
search = index=_internal sourcetype=mcp_server rpc_method=tools/call tool_name=splunk_run_query earliest=-15m \
| spath \
| bin _time span=10m \
| stats count as mcp_calls dc(tool_name) as distinct_mcp_tools values(request_id) as request_ids by _time username \
| where mcp_calls >= 5 AND distinct_mcp_tools <= 2 \
| eval trigger_rule="mcp_tool_loop", severity="high", actor=username, mcp_user=username, session_id=mvindex(request_ids, 0), description="MCP agent ".username." made ".mcp_calls." splunk_run_query calls in 10m with only ".distinct_mcp_tools." distinct tools — possible runaway agent"

dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 0
alert.track = 1
alert.suppress = 0
alert.severity = 4
action.agentsight_investigate = 1

[AgentSight - MCP Index Scope Violation]
description = MCP agent queried indexes outside its allowlist or probed sensitive index names.
search = index=_audit sourcetype=audittrail action=search (info=completed OR info=granted) earliest=-15m \
| rex field=search "index\s*=\s*\"?(?<queried_index>[a-zA-Z0-9_*-]+)" \
| eval mcp_user=user, spl_query=search \
| lookup agent_index_allowlist mcp_user OUTPUT allowed_indexes \
| eval allowed=if(isnull(allowed_indexes), "main,agentsight", allowed_indexes) \
| eval scope_violation=if(isnotnull(queried_index) AND NOT match(allowed, queried_index), 1, 0) \
| where scope_violation=1 OR match(search, "(?i)index=(secrets|credentials|prod_keys)") \
| stats count as violations values(search) as queries values(queried_index) as indexes by user \
| eval trigger_rule="mcp_scope_violation", severity="critical", actor=user, mcp_user=user, description="MCP agent ".user." violated index scope ".violations." time(s) — autonomous workforce governance"

dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 0
alert.track = 1
alert.suppress = 0
alert.severity = 5
action.agentsight_investigate = 1

[AgentSight - MCP Off-Hours Burst]
description = MCP agent activity burst during off-hours (before 06:00 or after 22:00 local).
search = index=_internal sourcetype=mcp_server rpc_method=tools/call earliest=-24h \
| spath \
| eval hour=strftime(_time, "%H"), is_off_hours=if(hour<6 OR hour>=22, 1, 0) \
| where is_off_hours=1 \
| stats count as off_hours_mcp_calls dc(request_id) as sessions values(tool_name) as tools_used by username \
| where off_hours_mcp_calls >= 8 \
| eval trigger_rule="mcp_off_hours_burst", severity="medium", actor=username, mcp_user=username, session_id="", description="MCP agent ".username." made ".off_hours_mcp_calls." off-hours MCP calls — review autonomous schedule"

dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 0
alert.track = 1
alert.suppress = 0
alert.severity = 3
action.agentsight_investigate = 1
